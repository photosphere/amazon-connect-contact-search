<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ListContactReferences 调试工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 24px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    header h1 { font-size: 1.4rem; font-weight: 600; color: #fff; }
    .status-bar { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: #94a3b8; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #64748b; display: inline-block; margin-right: 6px; }
    .status-dot.ok { background: #22c55e; animation: pulse 2s infinite; }
    .status-dot.error { background: #ef4444; }
    .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .panel { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; padding: 20px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .panel label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
    .panel input, .panel select { width: 100%; background: #0f1117; border: 1px solid #2d3348; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
    .panel input:focus, .panel select:focus { border-color: #6366f1; }
    .btn-row { display: flex; align-items: flex-end; gap: 10px; }
    .btn { padding: 9px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-danger { background: #ef4444; color: #fff; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2d3348; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; color: #475569; }
    .error-state { text-align: center; padding: 30px 20px; color: #ef4444; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; margin-bottom: 24px; word-break: break-all; }
    .json-view { background: #0f1117; border: 1px solid #2d3348; border-radius: 10px; padding: 20px; font-family: "SF Mono","Fira Code",monospace; font-size: 0.82rem; line-height: 1.6; color: #94a3b8; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 70vh; overflow-y: auto; }
    .json-view::-webkit-scrollbar { width: 6px; }
    .json-view::-webkit-scrollbar-track { background: #0f1117; }
    .json-view::-webkit-scrollbar-thumb { background: #3d4460; border-radius: 3px; }
    .ref-types { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .ref-types label { display: inline-flex; align-items: center; gap: 4px; font-size: 0.82rem; color: #94a3b8; text-transform: none; letter-spacing: normal; cursor: pointer; }
    .ref-types input[type="checkbox"] { accent-color: #6366f1; }
  </style>
</head>
<body>

<header>
  <h1>🔗 ListContactReferences 调试工具</h1>
  <div class="status-bar">
    <span><span class="status-dot" id="status-dot"></span><span id="status-text">就绪</span></span>
  </div>
</header>

<div class="panel">
  <div><label>Connect 实例 ID</label><input id="cfg-instance-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
  <div><label>Contact ID</label><input id="cfg-contact-id" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" /></div>
  <div>
    <label>Reference Types</label>
    <div class="ref-types">
      <label><input type="checkbox" value="ATTACHMENT" checked /> ATTACHMENT</label>
      <label><input type="checkbox" value="URL" checked /> URL</label>
      <label><input type="checkbox" value="NUMBER" checked /> NUMBER</label>
      <label><input type="checkbox" value="STRING" checked /> STRING</label>
      <label><input type="checkbox" value="DATE" checked /> DATE</label>
      <label><input type="checkbox" value="EMAIL" checked /> EMAIL</label>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-search">🔍 查询</button>
    <button class="btn btn-danger" id="btn-clear">清空</button>
  </div>
</div>

<div id="error-container"></div>
<div id="loading-container" style="display:none;" class="empty-state"><span class="spinner"></span> 正在查询...</div>
<div id="empty-state" class="empty-state">输入 Contact ID 后点击查询</div>
<pre class="json-view" id="json-output" style="display:none;"></pre>

<script type="module" src="/src/contact-reference-search.js"></script>
</body>
</html>
